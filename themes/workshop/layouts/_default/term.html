{{- define "main" -}}
<main class="page">

  <header class="list-head">
    <div>
      <div class="section-id"><span class="dot"></span><span>TAG / #{{ .Title | urlize }}</span></div>
      <h1>Tagged <em>{{ .Title }}.</em></h1>
    </div>
    <p class="lede">{{ len .Pages }} {{ if eq (len .Pages) 1 }}post{{ else }}posts{{ end }} on this topic, newest first.</p>
  </header>

  <div class="cards" style="margin-top:48px">
    {{- range .Pages.ByDate.Reverse -}}
      {{ partial "post-card.html" . }}
    {{- end }}
  </div>

</main>
{{- end -}}
